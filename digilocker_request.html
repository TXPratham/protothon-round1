<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DigiLocker Document Request | Public Services</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="public complaint.css">
</head>

<body>

    <header style="position: relative;">
        <a href="homepage.html"
            style="position: absolute; left: 20px; top: 20px; color: white; text-decoration: none; font-size: 1.5rem;"><i
                class="fa fa-arrow-left"></i></a>
        <div class="brand-logo" style="text-align: center; margin-bottom: 10px;">
            <img src="logo.png" alt="Logo" style="width: 64px; height: 64px; object-fit: contain; border-radius: 50%;">
        </div>
        <h1>DigiLocker Integration Portal</h1>
        <p>Request and fetch official documents</p>
    </header>

    <main>
        <div class="card">
            <h2>Request Document</h2>

            <form id="digilockerForm" action="/verify" method="GET">

                <label>Full Name (as per Aadhaar)</label>
                <div class="input-icon">
                    <i class="fa fa-user"></i>
                    <input type="text" name="fullname" placeholder="Enter your full name" required>
                </div>

                <label>Aadhaar Number</label>
                <div class="input-icon">
                    <i class="fa fa-id-card"></i>
                    <input type="text" name="aadhaar" pattern="[0-9]{12}" placeholder="Enter 12-digit Aadhaar Number"
                        required>
                </div>

                <label>Document Type</label>
                <div class="input-icon">
                    <i class="fa fa-file-alt"></i>
                    <select name="doctype" required>
                        <option value="">Select Document Type</option>
                        <option value="PANCR">PAN Verification Record</option>
                        <option value="DRVLC">Driving License</option>
                        <option value="VEHRG">Vehicle Registration</option>
                        <option value="RATCR">Ration Card</option>
                        <option value="SSCE">Class X Marksheet</option>
                        <option value="HSC">Class XII Marksheet</option>
                        <option value="DEGREE">Degree/Diploma Certificate</option>
                    </select>
                </div>

                <label>Purpose of Request</label>
                <div class="input-icon textarea-icon">
                    <i class="fa fa-comment-dots"></i>
                    <textarea name="purpose" rows="3" placeholder="Briefly state why you need this document..."
                        required></textarea>
                </div>

                <div class="consent-notice"
                    style="margin-top: 20px; font-size: 0.9em; display: flex; align-items: flex-start; gap: 10px;">
                    <input type="checkbox" id="dpdpConsent" name="dpdpConsent" required
                        style="width: auto; margin-top: 3px; cursor: pointer;">
                    <label for="dpdpConsent"
                        style="margin-top: 0; font-weight: normal; cursor: pointer; line-height: 1.4;">
                        I consent to the fetching and usage of my documents via DigiLocker for public service delivery,
                        acknowledging the "Notice and Consent" provisions as mandated by the DPDP Act.
                    </label>
                </div>

                <button type="submit">
                    <i class="fa fa-download"></i> Request from DigiLocker
                </button>
            </form>

            <div id="result"></div>
        </div>
    </main>

    <footer>
        <p>© 2026 Public Services Oversight Committee</p>
    </footer>

    <script>
        document.getElementById('digilockerForm').addEventListener('submit', async function (e) {
            e.preventDefault(); // Prevent standard page reload/form submit

            const resultDiv = document.getElementById('result');
            const submitBtn = this.querySelector('button[type="submit"]');

            // Get form values
            const fullName = document.querySelector('input[name="fullname"]').value;
            const aadhaar = document.querySelector('input[name="aadhaar"]').value;
            const docTypeSelect = document.querySelector('select[name="doctype"]');
            const docTypeName = docTypeSelect.options[docTypeSelect.selectedIndex].text;

            // UI Loading State
            submitBtn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Connecting to API...';
            submitBtn.disabled = true;
            resultDiv.innerHTML = `
                <div style="background: #fff3e0; padding: 15px; border-radius: 8px; border: 1px solid #ff9800; margin-top: 15px;">
                    <h4 style="color: #ff9800; margin-bottom: 10px;"><i class="fa fa-plug"></i> Establishing Secure DigiLocker API Connection...</h4>
                    <p style="font-size: 0.9em; margin: 0;">Authenticating citizen details using Aadhaar...</p>
                </div>
            `;

            try {
                // Simulate an API call latency using fetch and a Promise
                // In production, this would be: await fetch('/verify', { method: 'POST', body: ... })
                await new Promise(resolve => setTimeout(resolve, 2500));

                submitBtn.innerHTML = '<i class="fa fa-download"></i> Request from DigiLocker';
                submitBtn.disabled = false;

                // API Success Response UI
                resultDiv.innerHTML = `
                    <div style="background: #e8f5e9; padding: 20px; border-radius: 8px; border: 1px solid #4CAF50; margin-top: 20px;">
                        <h3 style="color: #4CAF50; margin-top: 0; margin-bottom: 15px;">
                            <i class="fa fa-check-circle"></i> Document Successfully Retrieved
                        </h3>
                        <p style="font-size: 0.9em; margin-bottom: 15px;">
                            <strong>API Response (200 OK):</strong> DigiLocker authentication successful. The requested record has been fetched securely from the central repository.
                        </p>
                        
                        <div style="padding: 15px; background: white; border: 1px dashed #aaa; border-radius: 6px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
                                <span style="font-weight: bold; color: #333;"><i class="fa fa-file-pdf" style="color: #d32f2f;"></i> ${docTypeName}</span>
                                <span style="background: #e3f2fd; color: #1976d2; padding: 2px 8px; border-radius: 12px; font-size: 0.8em; font-weight: bold;">Verified</span>
                            </div>
                            <p style="margin: 5px 0; font-size: 0.9em;"><strong>Citizen Name:</strong> ${fullName}</p>
                            <p style="margin: 5px 0; font-size: 0.9em;"><strong>Aadhaar No:</strong> XXXX-XXXX-${aadhaar.slice(-4)}</p>
                            <p style="margin: 5px 0; font-size: 0.9em;"><strong>Date Fetched:</strong> ${new Date().toLocaleString()}</p>
                            
                            <a href="#" style="display: inline-block; margin-top: 15px; background: #6a0dad; color: white; text-decoration: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; font-size: 0.9em;">
                                <i class="fa fa-eye"></i> View Original Document
                            </a>
                        </div>
                    </div>
                `;
            } catch (error) {
                submitBtn.innerHTML = '<i class="fa fa-download"></i> Request from DigiLocker';
                submitBtn.disabled = false;

                resultDiv.innerHTML = `
                    <div style="background: #ffebee; padding: 15px; border-radius: 8px; border: 1px solid #f44336; margin-top: 15px;">
                        <h4 style="color: #f44336; margin-bottom: 10px;"><i class="fa fa-times-circle"></i> API Connection Failed</h4>
                        <p style="font-size: 0.9em; margin: 0;">Could not connect to DigiLocker API. Please check your network or try again later.</p>
                    </div>
                `;
            }
        });
    </script>

</body>

</html>
